name: Frontend CI

on:
  pull_request:
    paths:
      - "src/**"
      - "public/**"
      - "package.json"
      - "package-lock.json"
      - "pnpm-lock.yaml"
      - "bun.lock"
      - "next.config.mjs"
      - "eslint.config.mjs"
      - "jsconfig.json"
      - "postcss.config.mjs"
      - ".github/workflows/frontend.yml"
  push:
    branches:
      - main
      - develop
    paths:
      - "src/**"
      - "public/**"
      - "package.json"
      - "package-lock.json"
      - "pnpm-lock.yaml"
      - "bun.lock"
      - "next.config.mjs"
      - "eslint.config.mjs"
      - "jsconfig.json"
      - "postcss.config.mjs"
      - ".github/workflows/frontend.yml"

jobs:
  frontend:
    name: Lint And Build Frontend
    runs-on: ubuntu-latest
    env:
      MONGODB_URI: mongodb://localhost:27017/eduvault-ci
      MONGODB_DB: eduvault-ci
      JWT_SECRET: ci-jwt-secret
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_GATEWAY_URL: https://gateway.pinata.cloud
      PINATA_JWT: ci-pinata-token
      NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ci-walletconnect-project-id
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Lint frontend
        run: npm run lint --if-present -- --ignore-pattern "src/app/api/**" src/app src/components src/hooks src/providers src/utils

      - name: Type check
        run: npm run typecheck --if-present

      - name: Run tests
        run: npm test --if-present

      - name: Build frontend
        run: npm run build --if-present