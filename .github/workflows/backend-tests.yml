name: Backend Integration Tests

on:
  pull_request:
    paths:
      - "src/app/api/**"
      - "test/**"
      - "package.json"
      - "package-lock.json"
  push:
    branches:
      - main
      - develop

jobs:
  test:
    name: Run Backend Vitest Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run test:integration
